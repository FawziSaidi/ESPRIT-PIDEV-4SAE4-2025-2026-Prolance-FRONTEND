<!-- ── Floating chatbot widget ── -->
<div class="chatbot-wrapper">

  <!-- Chat window -->
  <div class="chatbot-window" [class.open]="isOpen">

    <!-- Header -->
    <div class="chatbot-header">
      <div class="chatbot-header-left">
        <div class="chatbot-avatar">
          <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-1 14H9V8h2v8zm4 0h-2V8h2v8z"
                  fill="white" opacity="0"/>
            <circle cx="12" cy="12" r="10" stroke="white" stroke-width="1.5"/>
            <path d="M8 12h8M12 8v8" stroke="white" stroke-width="1.5" stroke-linecap="round"/>
          </svg>
        </div>
        <div>
          <p class="chatbot-header-name">AI Assistant</p>
          <p class="chatbot-header-status">
            <span class="status-dot"></span> Online
          </p>
        </div>
      </div>
      <button class="chatbot-close-btn" (click)="toggleChat()">✕</button>
    </div>

    <!-- Messages -->
    <div class="chatbot-messages" #messagesContainer>
      <div *ngFor="let msg of messages" class="msg-row" [class.user-row]="msg.role === 'user'">
        <div class="msg-avatar" *ngIf="msg.role === 'assistant'">🤖</div>
        <div class="msg-bubble" [class.user-bubble]="msg.role === 'user'" [class.bot-bubble]="msg.role === 'assistant'">
          <p class="msg-text" [innerHTML]="msg.content"></p>
        </div>
      </div>

      <!-- Typing indicator -->
      <div class="msg-row" *ngIf="loading">
        <div class="msg-avatar">🤖</div>
        <div class="msg-bubble bot-bubble typing-bubble">
          <span class="dot"></span><span class="dot"></span><span class="dot"></span>
        </div>
      </div>
    </div>

    <!-- Input -->
    <div class="chatbot-input-area">
      <input
        class="chatbot-input"
        type="text"
        [(ngModel)]="inputText"
        placeholder="Ask me anything..."
        (keydown.enter)="sendMessage()"
        [disabled]="loading"/>
      <button class="chatbot-send-btn" (click)="sendMessage()" [disabled]="loading || !inputText.trim()">
        <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg" width="18" height="18">
          <path d="M22 2L11 13" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
          <path d="M22 2L15 22L11 13L2 9L22 2Z" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </button>
    </div>

  </div>

  <!-- Floating button -->
  <button class="chatbot-fab" (click)="toggleChat()" [class.active]="isOpen">
    <svg *ngIf="!isOpen" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg" width="26" height="26">
      <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"
            stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
    </svg>
    <svg *ngIf="isOpen" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg" width="22" height="22">
      <line x1="18" y1="6" x2="6" y2="18" stroke="white" stroke-width="2.5" stroke-linecap="round"/>
      <line x1="6" y1="6" x2="18" y2="18" stroke="white" stroke-width="2.5" stroke-linecap="round"/>
    </svg>
    <span class="fab-badge" *ngIf="unreadCount > 0 && !isOpen">{{ unreadCount }}</span>
  </button>

</div>
