<div class="modal-overlay" *ngIf="isVisible && plan" (click)="onOverlayClick($event)">
  <div class="modal-container">

    <!-- Header violet -->
    <div class="modal-header">
      <h2>Confirmer votre abonnement</h2>
    </div>

    <!-- Body -->
    <div class="modal-body">

      <!-- Plan sélectionné -->
      <div class="plan-summary">
        <h3 class="plan-title">Plan {{ plan.name }} - {{ getTypeName() }}</h3>
        <p class="plan-price-info">{{ plan.price }} DT / {{ getDuration() }}</p>
        <p class="plan-features-summary">{{ getFeaturesSummary() }}</p>
      </div>

      <!-- Calcul du prix -->
      <div class="price-breakdown">
        <div class="price-row">
          <span>Sous-total:</span>
          <span>{{ subtotal }} DT</span>
        </div>
        <div class="price-row">
          <span>TVA (19%):</span>
          <span>{{ tva }} DT</span>
        </div>
        <div class="price-row total">
          <span>Total:</span>
          <span class="total-price">{{ total }} DT</span>
        </div>
      </div>

      <!-- Auto-renew checkbox -->
      <div class="auto-renew">
        <label>
          <input type="checkbox" [(ngModel)]="autoRenew" />
          Renouvellement automatique
        </label>
      </div>

      <!-- Boutons -->
      <div class="modal-actions">
        <button class="btn-cancel" (click)="onCancel()">Annuler</button>
        <button class="btn-confirm" (click)="onConfirm()">Confirmer</button>
      </div>

    </div>
  </div>
</div>
