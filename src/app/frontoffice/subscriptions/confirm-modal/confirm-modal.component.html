<div class="modal-overlay" *ngIf="isVisible && plan" (click)="onOverlayClick($event)">
  <div class="modal-container">

    <!-- Header -->
    <div class="modal-header">
      <div class="header-icon">🛒</div>
      <h2>Confirmer votre abonnement</h2>
      <p class="header-sub">Vérifiez les détails avant de confirmer</p>
    </div>

    <!-- Body -->
    <div class="modal-body">

      <!-- Plan summary -->
      <div class="plan-summary">
        <div class="summary-left">
          <h3 class="summary-name">{{ plan.name }}</h3>
          <span class="summary-type">{{ getTypeName() }} · {{ getDuration() }}</span>
        </div>
        <span class="summary-price">{{ plan.price }} DT</span>
      </div>

      <!-- Features -->
      <div class="features-row">
        <span class="feature-pill" *ngFor="let f of getFeaturesSummary()">{{ f }}</span>
      </div>

      <!-- Price breakdown -->
      <div class="price-breakdown">
        <div class="price-line">
          <span>Sous-total</span>
          <span>{{ subtotal }} DT</span>
        </div>
        <div class="price-line">
          <span>TVA (19%)</span>
          <span>{{ tva }} DT</span>
        </div>
        <div class="price-line total">
          <span>Total</span>
          <span class="total-amount">{{ total }} DT</span>
        </div>
      </div>

      <!-- Auto-renew checkbox -->
      <div class="auto-renew-row">
        <label class="checkbox-label">
          <input type="checkbox" [(ngModel)]="autoRenew" />
          <span class="checkbox-custom"></span>
          <span class="checkbox-text">Renouvellement automatique</span>
        </label>
      </div>

      <!-- Actions -->
      <div class="modal-actions">
        <button class="btn-cancel" (click)="onCancel()" [disabled]="isProcessing">
          Retour
        </button>
        <button class="btn-confirm" (click)="onConfirm()" [disabled]="isProcessing">
          <span *ngIf="!isProcessing">💳 Payer {{ total }} DT</span>
          <span *ngIf="isProcessing" class="processing">
            <span class="mini-spinner"></span> Traitement...
          </span>
        </button>
      </div>

    </div>
  </div>
</div>
