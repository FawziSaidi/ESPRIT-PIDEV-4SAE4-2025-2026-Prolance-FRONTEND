<aside class="sidebar">
  <div class="logo-container">
    <div class="logo">
      <img src="assets/img/prolance.png" alt="Prolance Logo" width="40" height="40" />
      <span class="logo-text">PROLANCE</span>
    </div>
  </div>

  <nav class="menu">
    <ng-container *ngFor="let item of menuItems">
      <!-- Items with Angular routes -->
      <a *ngIf="item.route"
         [routerLink]="item.route"
         routerLinkActive="active"
         [class.active]="activeMenu === item.id"
         (click)="setActiveMenu(item.id)"
         class="menu-item">
        <span class="menu-icon">{{ item.icon }}</span>
        <span class="menu-label">{{ item.label }}</span>
      </a>
      <!-- Placeholder items (no route yet) -->
      <a *ngIf="!item.route"
         [href]="item.link"
         [class.active]="activeMenu === item.id"
         (click)="setActiveMenu(item.id)"
         class="menu-item">
        <span class="menu-icon">{{ item.icon }}</span>
        <span class="menu-label">{{ item.label }}</span>
      </a>
    </ng-container>
  </nav>
</aside>
