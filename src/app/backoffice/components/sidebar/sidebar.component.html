<aside class="sidebar">
  <div class="logo-container">
    <div class="logo">
      <img src="assets/img/prolance.png" alt="Prolance Logo" width="40" height="40" />
      <span class="logo-text">PROLANCE</span>
    </div>
  </div>

  <nav class="menu">
    <ng-container *ngFor="let item of menuItems">
      <!-- Item avec route Angular -->
      <a *ngIf="item.route"
         [routerLink]="item.route"
         routerLinkActive="active"
         class="menu-item"
         (click)="setActiveMenu(item.id)">
        <span class="menu-icon">{{ item.icon }}</span>
        <span class="menu-label">{{ item.label }}</span>
      </a>

      <!-- Item sans route (placeholder) -->
      <a *ngIf="!item.route"
         class="menu-item"
         [class.active]="activeMenu === item.id"
         style="cursor: pointer;"
         (click)="setActiveMenu(item.id); $event.preventDefault()">
        <span class="menu-icon">{{ item.icon }}</span>
        <span class="menu-label">{{ item.label }}</span>
      </a>
    </ng-container>
  </nav>
</aside>
