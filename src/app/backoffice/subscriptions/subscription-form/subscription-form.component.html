<div class="form-container">
  <h1>{{ isEditMode ? 'Modifier le plan' : 'Créer un nouveau plan' }}</h1>

  <div class="loading" *ngIf="loading">
    <p>Chargement...</p>
  </div>

  <form (ngSubmit)="onSubmit()" *ngIf="!loading">

    <!-- Row 1: Nom + Type -->
    <div class="form-row">
      <div class="form-group">
        <label>Nom du plan *</label>
        <input type="text" [(ngModel)]="subscription.name" name="name"
               placeholder="Ex: Pro Freelancer"
               [class.error]="formErrors['name']" />
        <span class="error-text" *ngIf="formErrors['name']">{{ formErrors['name'] }}</span>
      </div>
      <div class="form-group">
        <label>Type *</label>
        <select [(ngModel)]="subscription.type" name="type"
                [class.error]="formErrors['type']">
          <option value="FREELANCER">FREELANCER</option>
          <option value="CLIENT">CLIENT</option>
        </select>
        <span class="error-text" *ngIf="formErrors['type']">{{ formErrors['type'] }}</span>
      </div>
    </div>

    <!-- Row 2: Prix + Cycle -->
    <div class="form-row">
      <div class="form-group">
        <label>Prix (DT) *</label>
        <input type="number" [(ngModel)]="subscription.price" name="price"
               placeholder="29.99" step="0.01"
               [class.error]="formErrors['price']" />
        <span class="error-text" *ngIf="formErrors['price']">{{ formErrors['price'] }}</span>
      </div>
      <div class="form-group">
        <label>Cycle de facturation *</label>
        <select [(ngModel)]="subscription.billingCycle" name="billingCycle"
                [class.error]="formErrors['billingCycle']">
          <option value="SEMESTRIELLE">SEMESTRIELLE</option>
          <option value="ANNUELLE">ANNUELLE</option>
        </select>
        <span class="error-text" *ngIf="formErrors['billingCycle']">{{ formErrors['billingCycle'] }}</span>
      </div>
    </div>

    <!-- Row 3: Description + Max Projets -->
    <div class="form-row">
      <div class="form-group">
        <label>Description</label>
        <input type="text" [(ngModel)]="subscription.description" name="description"
               placeholder="Description du plan..." />
      </div>
      <div class="form-group">
        <label>Max Projets</label>
        <input type="number" [(ngModel)]="subscription.maxProjects" name="maxProjects"
               placeholder="20" />
      </div>
    </div>

    <!-- Row 4: Max Propositions + Max Jobs -->
    <div class="form-row">
      <div class="form-group">
        <label>Max Propositions</label>
        <input type="number" [(ngModel)]="subscription.maxProposals" name="maxProposals"
               placeholder="50" />
      </div>
      <div class="form-group">
        <label>Max Jobs actifs</label>
        <input type="number" [(ngModel)]="subscription.maxActiveJobs" name="maxActiveJobs"
               placeholder="10" />
      </div>
    </div>

    <!-- Options -->
    <div class="options-section">
      <h3>Options supplémentaires</h3>
      <div class="options-row">
        <label class="checkbox-label">
          <input type="checkbox" [(ngModel)]="subscription.featuredListing" name="featuredListing" />
          Featured Listing
        </label>
        <label class="checkbox-label">
          <input type="checkbox" [(ngModel)]="subscription.prioritySupport" name="prioritySupport" />
          Support Prioritaire
        </label>
        <label class="checkbox-label">
          <input type="checkbox" [(ngModel)]="subscription.analyticsAccess" name="analyticsAccess" />
          Accès Analytics
        </label>
      </div>
    </div>

    <!-- Error global -->
    <div class="global-error" *ngIf="errorMessage">
      {{ errorMessage }}
    </div>

    <!-- Validation error -->
    <div class="validation-error" *ngIf="formErrors['name']">
      {{ formErrors['name'] }}
    </div>

    <!-- Buttons -->
    <div class="form-actions">
      <button type="submit" class="btn-save">Enregistrer</button>
      <button type="button" class="btn-cancel" (click)="onCancel()">Annuler</button>
    </div>

  </form>
</div>
